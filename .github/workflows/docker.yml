---
name: Docker Build and Push
on:
  push:
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
      - '.github/scripts/matrix.sh'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
      - '.github/scripts/matrix.sh'
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'
permissions:
  contents: read
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.setup.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run setup
        id: setup
        env:
          DOCKERHUB_REPO: ${{ vars.DOCKERHUB_USERNAME }}/raspios
        run: echo "matrix=$(.github/scripts/matrix.sh)" >> "${GITHUB_OUTPUT}"
  docker:
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Login to Docker Hub
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          tags: ${{ matrix.tags }}
          platforms: ${{ matrix.platforms }}
          build-args: |
            RASPIOS_URL=${{ matrix.raspios_url }}
            RASPIOS_SHA256=${{ matrix.raspios_sha256 }}

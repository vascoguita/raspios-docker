---
name: Docker Build and Push
on:
  push:
    paths:
      - Dockerfile
      - .github/workflows/docker.yml
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/docker.yml
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Discover releases
        id: discover
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          set -eo pipefail
          INCLUDES=()
          for ARCH in arm64 armhf; do
            if [ "$ARCH" = "arm64" ]; then
              PLATFORMS="linux/arm64"
            else
              PLATFORMS="linux/arm/v6,linux/arm/v7,linux/arm64"
            fi
            while IFS= read -r DATE; do
              if ! curl -fsSo /dev/null "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/raspios/tags/${ARCH}-${DATE}/"; then
                SUITE=$(curl -fsSL "https://downloads.raspberrypi.com/raspios_lite_${ARCH}/images/raspios_lite_${ARCH}-${DATE}/" | \
                  grep -oP "(?<=${DATE}-raspios-)[a-z]+(?=-${ARCH}-lite\.img\.xz)" | head -1)
                [ -n "$SUITE" ] && INCLUDES+=("{\"arch\":\"${ARCH}\",\"date\":\"${DATE}\",\"suite\":\"${SUITE}\",\"platforms\":\"${PLATFORMS}\"}")
              fi
            done < <(curl -fsSL "https://downloads.raspberrypi.com/raspios_lite_${ARCH}/images/" | \
              grep -oP "(?<=href=\"raspios_lite_${ARCH}-)\d{4}-\d{2}-\d{2}(?=/)" | sort)
          done
          MATRIX_JSON=$(printf '%s,' "${INCLUDES[@]}")
          echo "matrix={\"include\":[${MATRIX_JSON%,}]}" >> "${GITHUB_OUTPUT}"
  build:
    needs: discover
    if: needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ${{ format('{0}/raspios:{1}', vars.DOCKERHUB_USERNAME, matrix.arch) || '' }}
            ${{ matrix.arch == 'arm64' && format('{0}/raspios:latest', vars.DOCKERHUB_USERNAME) || '' }}
            ${{ format('{0}/raspios:{1}-{2}', vars.DOCKERHUB_USERNAME, matrix.arch, matrix.date) || '' }}
          platforms: ${{ matrix.platforms }}
          build-args: |
            DATE=${{ matrix.date }}
            SUITE=${{ matrix.suite }}
            ARCH=${{ matrix.arch }}
